<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Leaderboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <header>
            <h1>Legion Leaderboard</h1>
        </header>

        <main>
            <!-- Input Form -->
            <section id="input" class="content-section">
                <div class="form-card">
                    <h2>Manage Scores</h2>
                    <form id="score-form">
                        <div class="input-group">
                            <label for="player-name">Player Name</label>
                            <input type="text" id="player-name" placeholder="Enter name" required autocomplete="off">
                        </div>
                        <div class="input-group">
                            <label for="player-score">Score</label>
                            <input type="number" id="player-score" placeholder="0" required>
                        </div>
                        <div class="actions">
                            <button type="submit" id="add-btn" class="primary-btn" onclick="setAction('add')">Add to
                                Score (+)</button>
                        </div>
                        <p class="note">Enter a name and score. If the player exists, the score will be added to their
                            total.</p>
                    </form>
                </div>
            </section>

            <!-- Leaderboard -->
            <section id="leaderboard" class="content-section">
                <div class="leaderboard-header editable">
                    <span>Rank</span>
                    <span>Player</span>
                    <span>Score</span>
                    <!-- Actions col implicit -->
                </div>
                <div id="leaderboard-list" class="leaderboard-list">
                    <!-- Javascript will populate this -->
                    <div class="loading">Loading scores...</div>
                </div>
            </section>
        </main>
    </div>

    <!-- Emblem Modal -->
    <div id="emblem-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3>Award Emblem</h3>
            <p>Select an emblem for <span id="modal-player-name" class="highlight-text"></span>:</p>
            <div class="emblem-grid">
                <button class="emblem-btn" onclick="submitEmblem('Week 1 Winner')">Week 1 Winner</button>
                <button class="emblem-btn" onclick="submitEmblem('Week 2 Winner')">Week 2 Winner</button>
                <button class="emblem-btn" onclick="submitEmblem('Week 3 Winner')">Week 3 Winner</button>
                <button class="emblem-btn" onclick="submitEmblem('Week 4 Winner')">Week 4 Winner</button>
            </div>
            <button class="close-btn" onclick="closeEmblemModal()">Cancel</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
